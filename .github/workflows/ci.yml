name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Audit (high+)
        run: npm audit --audit-level=high

      - name: Shared lib drift vs widget
        run: |
          set -euo pipefail
          SIBLING=https://raw.githubusercontent.com/Quote-Bubble/quoter-widget-frontend/main
          for f in lib/types.ts lib/roof-geometry.ts lib/roof-lines.ts; do
            echo "== diff $f =="
            curl -fsSL "$SIBLING/$f" -o "/tmp/sibling-$(basename "$f")"
            diff -u "$f" "/tmp/sibling-$(basename "$f")"
          done
